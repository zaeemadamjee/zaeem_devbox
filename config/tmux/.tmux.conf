# --- Prefix key: Ctrl-Space ---
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# --- True color (24-bit) ---
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*:Tc"

# --- Mouse support ---
set -g mouse on

# --- Window/pane numbering from 1 ---
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# --- Don't rename windows automatically ---
set-option -g allow-rename off

# --- Faster escape (important for vim/neovim) ---
set -sg escape-time 10

# --- Reload config in place ---
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# --- Pane splitting ---
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"

# --- Pane navigation (vim keys) ---
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# --- Pane resizing (repeatable with -r) ---
bind -r Left  resize-pane -L 5
bind -r Right resize-pane -R 5
bind -r Down  resize-pane -D 5
bind -r Up    resize-pane -U 5

# --- Pane borders: dim inactive, highlight active ---
set -g pane-border-style 'fg=#3b4261'
set -g pane-active-border-style 'fg=#7aa2f7'

# --- Copy mode (vim keys + clipboard via tmux-yank) ---
setw -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send -X cancel

# --- Status bar (Tokyo Night, powerline-style) ---
set -g status-position bottom
set -g status-style 'bg=#1a1b26 fg=#a9b1d6'

# Left: session name in blue pill
set -g status-left '#[bg=#7aa2f7,fg=#1a1b26,bold] #S #[bg=#1a1b26,fg=#7aa2f7,nobold]'
set -g status-left-length 20

# Right: date segment → time segment
set -g status-right '#[fg=#3b4261,bg=#1a1b26]#[bg=#3b4261,fg=#a9b1d6] %b %d %y #[fg=#7aa2f7,bg=#3b4261]#[bg=#7aa2f7,fg=#1a1b26,bold] %H:%M '
set -g status-right-length 40

# Window tabs: dim inactive, highlight active with blue pill
set -g window-status-format '#[fg=#565f89] #I:#W '
set -g window-status-current-format '#[fg=#1a1b26,bg=#7aa2f7,bold] #I:#W #[fg=#7aa2f7,bg=#1a1b26,nobold]'
set -g window-status-separator ''

# --- Plugins (TPM) ---
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.tmux/plugins/'
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'

set -g @continuum-restore 'on'
set -g @resurrect-capture-pane-contents 'on'

run '~/.tmux/plugins/tpm/tpm'
